<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Notes</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    display: flex;
    justify-content: center;
    padding: 64px 24px;
  }
  main { width: 100%; max-width: 520px; }
  h1 { font-size: 28px; margin: 0 0 24px; }
  form { display: flex; gap: 10px; margin-bottom: 24px; }
  input {
    flex: 1; padding: 12px 14px; font-size: 16px;
    border: 1px solid #d2d2d7; border-radius: 10px; outline: none; background: #fff;
  }
  input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
  button {
    padding: 12px 20px; font-size: 16px; font-weight: 600; color: #fff;
    background: #0071e3; border: 0; border-radius: 10px; cursor: pointer;
  }
  button:hover { background: #0077ed; }
  .search { margin-bottom: 16px; }
  .counter { margin: 0 0 10px; color: #6e6e73; font-size: 14px; font-weight: 600; }
  ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  li {
    background: #fff; border: 1px solid #e5e5ea; border-radius: 12px;
    padding: 14px 16px; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .empty { color: #86868b; font-style: italic; }
</style>
</head>
<body>
<main>
  <h1>📝 Notes</h1>
  <form id="form">
    <input id="note" placeholder="New note" autocomplete="off" />
    <button type="submit">Save</button>
  </form>
  <input id="search" class="search" placeholder="Search notes" autocomplete="off" />
  <div id="counter" class="counter">0 notes</div>
  <ul id="list"></ul>
</main>
<script>
  const API = "http://localhost:3001";
  const list = document.getElementById("list");
  const counter = document.getElementById("counter");
  const input = document.getElementById("note");
  const search = document.getElementById("search");

  const escapeHtml = (s) =>
    s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  async function load() {
    const query = search.value.trim();
    const path = query ? `/notes/search?q=${encodeURIComponent(query)}` : "/notes";
    const notes = await (await fetch(API + path)).json();
    const noun = notes.length === 1 ? "note" : "notes";
    counter.textContent = query ? `${notes.length} matching ${noun}` : `${notes.length} ${noun}`;
    list.innerHTML = notes.length
      ? notes.map((n) => `<li>${escapeHtml(n.body)}</li>`).join("")
      : `<li class="empty">${query ? "No matching notes." : "No notes yet — add one above."}</li>`;
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const body = input.value.trim();
    if (!body) return;
    await fetch(API + "/notes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ body }),
    });
    input.value = "";
    await load();
  });

  search.addEventListener("input", load);

  load();
</script>
</body>
</html>
